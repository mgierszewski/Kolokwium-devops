version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: app
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1
      - DB_PATH=/data/app.db
    volumes:
      - app_data:/data
    networks:
      - backend

  proxy:
    image: nginx:1.25-alpine
    container_name: proxy
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - backend

volumes:
  app_data:
    # Pozwala na przetrwanie danych bazy przy restarcie kontenerów
    driver: local

networks:
  backend:
    driver: bridge
